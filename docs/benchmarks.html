<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LatentMesh • Benchmarks</title>
    <meta name="description" content="Benchmark comparison charts for latent and text-based multi-agent systems." />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body data-page="bench">
    <header class="nav wrap">
      <div class="nav-inner">
        <a class="brand" href="index.html"><span class="dot"></span>LatentMesh</a>
        <nav class="links" aria-label="Main">
          <a data-page="home" href="index.html">Home</a>
          <a data-page="docs" href="docs.html">Docs</a>
          <a data-page="bench" href="benchmarks.html">Benchmarks</a>
          <a href="https://github.com/latentmesh/latentmesh" target="_blank" rel="noreferrer">GitHub</a>
        </nav>
      </div>
    </header>

    <main class="wrap">
      <section class="sec">
        <h2>Benchmark comparison</h2>
        <div class="charts">
          <article class="chart">
            <h3>GPQA</h3>
            <div class="row"><span class="lb">Single Agent</span><span class="tr"><span class="bar" style="--v:39"></span></span><span class="vl">39</span></div>
            <div class="row"><span class="lb">TextMAS</span><span class="tr"><span class="bar" style="--v:46"></span></span><span class="vl">46</span></div>
            <div class="row"><span class="lb">LatentMAS</span><span class="tr"><span class="bar" style="--v:53"></span></span><span class="vl">53</span></div>
          </article>

          <article class="chart">
            <h3>AIME</h3>
            <div class="row"><span class="lb">Single Agent</span><span class="tr"><span class="bar" style="--v:22"></span></span><span class="vl">22</span></div>
            <div class="row"><span class="lb">TextMAS</span><span class="tr"><span class="bar" style="--v:30"></span></span><span class="vl">30</span></div>
            <div class="row"><span class="lb">LatentMAS</span><span class="tr"><span class="bar" style="--v:36"></span></span><span class="vl">36</span></div>
          </article>

          <article class="chart">
            <h3>SWE-Bench</h3>
            <div class="row"><span class="lb">Single Agent</span><span class="tr"><span class="bar" style="--v:24"></span></span><span class="vl">24</span></div>
            <div class="row"><span class="lb">TextMAS</span><span class="tr"><span class="bar" style="--v:33"></span></span><span class="vl">33</span></div>
            <div class="row"><span class="lb">LatentMAS</span><span class="tr"><span class="bar" style="--v:41"></span></span><span class="vl">41</span></div>
          </article>
        </div>
      </section>

      <footer class="footer">LatentMesh Benchmarks</footer>
    </main>

    <script src="assets/app.js"></script>
  </body>
</html>
